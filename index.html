    <script>
	window.onload=function() {
		var primerValor=prompt("introduce el primer numero ");
		var segundoValor=prompt("introduce el segundo numero ");
 
		if(parseInt(primerValor)>parseInt(segundoValor))
		{
			document.write("El primero es mas grande que el segundo");
		}else if(parseInt(primerValor)<parseInt(segundoValor)){
			document.write("El primero es mas pequeño que el segundo");
		}else{
			document.write("Son iguales");
		}
	}
    </script>
</head>
